<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Logger</title>
<style>
body { font-family: Arial; padding: 20px; background: #f4f6f8; }
h2 { text-align: center; }
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}
button {
    background: #00315F;
    color: white;
    border: none;
    border-radius: 5px;
}
.secondary {
    background: #555;
}
.danger {
    background: #a80000;
}
.log-entry {
    background: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}
small {
    color: gray;
}
</style>
</head>
<body>

<h2>Health Logger</h2>

<label>Date</label>
<input type="date" id="date">

<label>Time of Day</label>
<input type="time" id="time">

<label>Blood Pressure (e.g. 120/80)</label>
<input type="text" id="bp">

<label>Heart Rate</label>
<input type="number" id="hr">

<label>Blood Sugar</label>
<input type="number" id="sugar">

<label>Meal Timing</label>
<select id="meal">
<option value="">None</option>
<option>Before Meal</option>
<option>During Meal</option>
<option>After Meal</option>
</select>

<label>Insulin / Medication Notes</label>
<input type="text" id="med">

<label>Exercise Notes</label>
<input type="text" id="exercise">

<button onclick="saveLog()">Save Entry</button>

<hr>

<h3>Data Options</h3>

<button class="secondary" onclick="exportCSV()">Export to CSV</button>
<button class="danger" onclick="clearLogs()">Clear All Logs</button>

<h3>Log History</h3>
<div id="logs"></div>

<script>
function setDefaults() {
    const now = new Date();
    document.getElementById("date").value = now.toISOString().split("T")[0];
    document.getElementById("time").value = now.toTimeString().slice(0,5);
}

function saveLog() {
    const entry = {
        id: Date.now(),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        bp: document.getElementById("bp").value,
        hr: document.getElementById("hr").value,
        sugar: document.getElementById("sugar").value,
        meal: document.getElementById("meal").value,
        med: document.getElementById("med").value,
        exercise: document.getElementById("exercise").value
    };

    let logs = JSON.parse(localStorage.getItem("healthLogs")) || [];
    logs.unshift(entry);
    localStorage.setItem("healthLogs", JSON.stringify(logs));

    displayLogs();
    clearFields();
    setDefaults();
}

function displayLogs() {
    let logs = JSON.parse(localStorage.getItem("healthLogs")) || [];
    let logDiv = document.getElementById("logs");
    logDiv.innerHTML = "";

    logs.forEach(log => {
        logDiv.innerHTML += `
        <div class="log-entry">
            <strong>${log.date} at ${log.time}</strong><br>
            BP: ${log.bp}<br>
            HR: ${log.hr}<br>
            Sugar: ${log.sugar}<br>
            Meal: ${log.meal}<br>
            Meds: ${log.med}<br>
            Exercise: ${log.exercise}<br><br>
            <button class="danger" onclick="deleteLog(${log.id})">Delete Entry</button>
        </div>
        `;
    });
}

function deleteLog(id) {
    let logs = JSON.parse(localStorage.getItem("healthLogs")) || [];
    logs = logs.filter(log => log.id !== id);
    localStorage.setItem("healthLogs", JSON.stringify(logs));
    displayLogs();
}

function clearLogs() {
    if (confirm("Are you sure you want to delete all logs?")) {
        localStorage.removeItem("healthLogs");
        displayLogs();
    }
}

function exportCSV() {
    let logs = JSON.parse(localStorage.getItem("healthLogs")) || [];
    if (logs.length === 0) {
        alert("No data to export.");
        return;
    }

    let csv = "Date,Time,Blood Pressure,Heart Rate,Blood Sugar,Meal Timing,Medication,Exercise\n";

    logs.forEach(log => {
        csv += `${log.date},${log.time},${log.bp},${log.hr},${log.sugar},${log.meal},${log.med},${log.exercise}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "health_logs.csv";
    a.click();
    URL.revokeObjectURL(url);
}

function clearFields() {
    document.getElementById("bp").value = "";
    document.getElementById("hr").value = "";
    document.getElementById("sugar").value = "";
    document.getElementById("meal").value = "";
    document.getElementById("med").value = "";
    document.getElementById("exercise").value = "";
}

setDefaults();
displayLogs();
</script>

</body>
</html>
